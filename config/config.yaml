# MyFundSys 配置文件

# 数据库配置
database:
  path: data/fund_system.db
  backup_interval: 86400  # 每天备份一次

# GitHub 同步配置
sync:
  enabled: true
  auto_sync: true
  sync_interval: 3600  # 每小时同步
  repo: tw-openclaw/MyFundSys
  branch: main

# 估值提醒配置
alerts:
  diamond_pit:
    enabled: true
    pe_threshold: 25
    pb_threshold: 2
  death_top:
    enabled: true
    pe_threshold: 60
    pb_threshold: 6

# 数据采集配置
collectors:
  chinaetfs:
    enabled: true
    interval: 21600  # 每6小时
  qieman:
    enabled: true
    interval: 43200  # 每12小时
  xueqiu:
    enabled: true
    interval: 21600

# 日志配置
logging:
  level: INFO
  file: logs/fund_system.log
  max_size: 10485760  # 10MB
  backup_count: 5
