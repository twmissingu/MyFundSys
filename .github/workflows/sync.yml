name: Sync to GitHub

on:
  schedule:
    # 每小时同步一次
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Configure Git
      run: |
        git config --local user.email "bot@myfundsys.ai"
        git config --local user.name "MyFundSys Bot"
    
    - name: Run data sync
      run: |
        python scripts/sync_to_github.py
