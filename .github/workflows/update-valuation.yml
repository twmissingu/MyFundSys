name: Update Market Valuation

on:
  schedule:
    - cron: '0 */2 * * *'  # 每2小时执行一次（交易所时间）
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Fetch Valuation Data
      run: |
        echo "获取且慢估值数据..."
        
        # 尝试获取且慢估值数据
        HTTP_CODE=$(curl -s -w "%{http_code}" -o valuation_raw.json "https://qieman.com/api/v1/idx-eval/latest" || echo "000")
        
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✓ 成功获取数据"
          
          # 解析JSON并提取沪深300数据
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('valuation_raw.json', 'utf8'));
            
            if (data && data.data && Array.isArray(data.data)) {
              // 找到沪深300
              const hs300 = data.data.find(item => 
                item.name?.includes('沪深300') || item.code === '000300'
              );
              
              if (hs300) {
                const valuation = {
                  date: new Date().toISOString().split('T')[0],
                  updateTime: new Date().toISOString(),
                  pe: Number((hs300.pe || hs300.peRatio || 0).toFixed(2)),
                  pb: Number((hs300.pb || hs300.pbRatio || 0).toFixed(2)),
                  percentile: Number(((hs300.percentile || hs300.pePercentile || 0) / 100).toFixed(4)),
                  temperature: Math.round(hs300.temperature || hs300.score || 0),
                  source: 'qieman',
                  indexName: hs300.name || '沪深300'
                };
                fs.writeFileSync('frontend/public/valuation.json', JSON.stringify(valuation, null, 2));
                console.log('✓ 沪深300估值数据已保存');
                console.log(JSON.stringify(valuation, null, 2));
              } else {
                console.error('未找到沪深300数据');
                process.exit(1);
              }
            } else {
              console.error('API返回数据格式错误');
              process.exit(1);
            }
          "
        else
          echo "✗ 获取失败，HTTP状态码: $HTTP_CODE"
          exit 1
        fi
    
    - name: Commit and Push
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        
        # 检查是否有变化
        if git diff --quiet HEAD -- frontend/public/valuation.json 2>/dev/null; then
          echo "数据未变化，跳过提交"
          exit 0
        fi
        
        git add frontend/public/valuation.json
        git commit -m "data: 更新市场估值数据 [$(date +'%Y-%m-%d %H:%M')]"
        git push
        echo "✓ 数据已更新并推送"
