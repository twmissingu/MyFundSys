name: Update Market Valuation

on:
  schedule:
    - cron: '0 */2 * * *'  # 每2小时执行一次（交易所时间）
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Fetch Valuation Data
      run: |
        echo "尝试获取沪深300估值数据..."
        
        # 创建获取脚本
        cat > fetch_valuation.js << 'EOF'
        const https = require('https');
        const fs = require('fs');
        
        // 备用数据源列表
        const dataSources = [
          {
            name: '且慢',
            url: 'https://qieman.com/api/v1/idx-eval/latest',
            parse: (data) => {
              if (data && data.data && Array.isArray(data.data)) {
                const hs300 = data.data.find(item => 
                  item.name?.includes('沪深300') || item.code === '000300'
                );
                if (hs300) {
                  return {
                    pe: Number((hs300.pe || hs300.peRatio || 0).toFixed(2)),
                    pb: Number((hs300.pb || hs300.pbRatio || 0).toFixed(2)),
                    percentile: Number(((hs300.percentile || hs300.pePercentile || 0) / 100).toFixed(4)),
                    temperature: Math.round(hs300.temperature || hs300.score || 0),
                    source: 'qieman'
                  };
                }
              }
              return null;
            }
          },
          {
            name: '蛋卷基金',
            url: 'https://danjuanapp.com/djapi/index_eva/dj',
            headers: {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
            },
            parse: (data) => {
              if (data && data.data && Array.isArray(data.data.items)) {
                const hs300 = data.data.items.find(item => 
                  item.name?.includes('沪深300') || item.index_code === '000300'
                );
                if (hs300) {
                  return {
                    pe: Number((hs300.pe || 0).toFixed(2)),
                    pb: Number((hs300.pb || 0).toFixed(2)),
                    percentile: Number(((hs300.pe_percentile || 0)).toFixed(4)),
                    temperature: Math.round(hs300.score || 0),
                    source: 'danjuan'
                  };
                }
              }
              return null;
            }
          }
        ];
        
        // 使用硬编码的估值数据作为最终备用（基于最近的市场数据）
        const fallbackData = {
          date: new Date().toISOString().split('T')[0],
          updateTime: new Date().toISOString(),
          pe: 12.75,
          pb: 1.35,
          percentile: 0.45,
          temperature: 45,
          source: 'fallback',
          indexName: '沪深300',
          note: '使用备用数据，请检查API连接'
        };
        
        async function fetchFromSource(source) {
          return new Promise((resolve, reject) => {
            const options = {
              headers: {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                'Accept': 'application/json, text/plain, */*',
                'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
                ...(source.headers || {})
              },
              timeout: 15000
            };
            
            const req = https.get(source.url, options, (res) => {
              let data = '';
              res.on('data', chunk => data += chunk);
              res.on('end', () => {
                try {
                  if (res.statusCode === 200) {
                    const json = JSON.parse(data);
                    const result = source.parse(json);
                    if (result) {
                      console.log(`✓ 成功从 ${source.name} 获取数据`);
                      resolve(result);
                    } else {
                      reject(new Error(`${source.name}: 数据解析失败`));
                    }
                  } else {
                    reject(new Error(`${source.name}: HTTP ${res.statusCode}`));
                  }
                } catch (e) {
                  reject(new Error(`${source.name}: ${e.message}`));
                }
              });
            });
            
            req.on('error', reject);
            req.on('timeout', () => {
              req.destroy();
              reject(new Error(`${source.name}: 请求超时`));
            });
          });
        }
        
        async function main() {
          // 尝试所有数据源
          for (const source of dataSources) {
            try {
              const result = await fetchFromSource(source);
              const valuation = {
                date: new Date().toISOString().split('T')[0],
                updateTime: new Date().toISOString(),
                ...result,
                indexName: '沪深300'
              };
              
              fs.writeFileSync('frontend/public/valuation.json', JSON.stringify(valuation, null, 2));
              console.log('✓ 沪深300估值数据已保存');
              console.log(JSON.stringify(valuation, null, 2));
              process.exit(0);
            } catch (e) {
              console.error(`✗ ${e.message}`);
            }
          }
          
          // 所有数据源都失败，使用备用数据
          console.log('⚠ 所有数据源都失败，使用备用数据');
          fs.writeFileSync('frontend/public/valuation.json', JSON.stringify(fallbackData, null, 2));
          console.log(JSON.stringify(fallbackData, null, 2));
          process.exit(0);
        }
        
        main();
        EOF
        
        node fetch_valuation.js
    
    - name: Commit and Push
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        
        # 检查是否有变化
        if git diff --quiet HEAD -- frontend/public/valuation.json 2>/dev/null; then
          echo "数据未变化，跳过提交"
          exit 0
        fi
        
        git add frontend/public/valuation.json
        git commit -m "data: 更新市场估值数据 [$(date +'%Y-%m-%d %H:%M')]"
        git push
        echo "✓ 数据已更新并推送"
